services:
  - type: web
    name: line-ai-bot
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REPLY_DELAY_MS
        value: "180000"
    healthCheckPath: /
